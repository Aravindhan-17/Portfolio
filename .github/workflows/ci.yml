name: Next.js CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      # (Optional) Verify the standard build still works outside of Docker
      - name: Build Next.js Project
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        # Only login if it's a push to main, not a PR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # Push only if it's not a pull request
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            aravindhan1722/portfolio-app:latest
            aravindhan1722/portfolio-app:${{ github.sha }}
          cache-from: type=registry,ref=aravindhan1722/portfolio-app:buildcache
          cache-to: type=registry,ref=aravindhan1722/portfolio-app:buildcache,mode=max
